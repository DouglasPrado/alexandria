# Alexandria — Docker Compose v2 (Producao)
# Blueprint: 06-system_architecture.md — Topologia de Producao
#
# Servicos:
#   postgres      — PostgreSQL 18 (banco de metadados)
#   redis         — Redis 7 (fila de jobs, pub/sub)
#   orchestrator  — API REST + Scheduler + Media Workers
#   caddy         — Reverse proxy + TLS auto (Let's Encrypt)
#   node-agent-1  — No de storage local 1
#   node-agent-2  — No de storage local 2
#   node-agent-3  — No de storage local 3

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alexandria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alexandria}
      POSTGRES_DB: ${POSTGRES_DB:-alexandria}
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alexandria}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alexandria}:${POSTGRES_PASSWORD:-alexandria}@postgres:5432/${POSTGRES_DB:-alexandria}
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-alexandria=info,tower_http=info}
      JWT_SECRET: "${JWT_SECRET}"
      BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN}"
    volumes:
      - previewdata:/data/previews
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - orchestrator
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_CLUSTER_ID: ${CLUSTER_ID:-}
      API_PROXY_URL: "http://orchestrator:8080"
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - orchestrator
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  node-agent-1:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    environment:
      NODE_ID: "a1b2c3d4-0001-0000-0000-000000000001"
      NODE_NAME: "node-local-1"
      STORAGE_PATH: "/data/alexandria"
      MAX_CAPACITY_GB: "50"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      HEARTBEAT_INTERVAL_SECS: "60"
      BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN}"
      NODE_PORT: "9090"
      NODE_HOSTNAME: "node-agent-1"
    volumes:
      - node1data:/data/alexandria
    depends_on:
      orchestrator:
        condition: service_healthy

  node-agent-2:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    environment:
      NODE_ID: "a1b2c3d4-0002-0000-0000-000000000002"
      NODE_NAME: "node-local-2"
      STORAGE_PATH: "/data/alexandria"
      MAX_CAPACITY_GB: "50"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      HEARTBEAT_INTERVAL_SECS: "60"
      BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN}"
      NODE_PORT: "9090"
      NODE_HOSTNAME: "node-agent-2"
    volumes:
      - node2data:/data/alexandria
    depends_on:
      orchestrator:
        condition: service_healthy

  node-agent-3:
    build:
      context: .
      dockerfile: Dockerfile.node-agent
    environment:
      NODE_ID: "a1b2c3d4-0003-0000-0000-000000000003"
      NODE_NAME: "node-local-3"
      STORAGE_PATH: "/data/alexandria"
      MAX_CAPACITY_GB: "50"
      ORCHESTRATOR_URL: "http://orchestrator:8080"
      HEARTBEAT_INTERVAL_SECS: "60"
      BOOTSTRAP_TOKEN: "${BOOTSTRAP_TOKEN}"
      NODE_PORT: "9090"
      NODE_HOSTNAME: "node-agent-3"
    volumes:
      - node3data:/data/alexandria
    depends_on:
      orchestrator:
        condition: service_healthy

