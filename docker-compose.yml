# Alexandria — Docker Compose v2 (Producao)
# Blueprint: 06-system_architecture.md — Topologia de Producao
#
# Servicos:
#   postgres     — PostgreSQL 18 (banco de metadados)
#   redis        — Redis 7 (fila de jobs, pub/sub)
#   orchestrator — API REST + Scheduler + Media Workers
#   caddy        — Reverse proxy + TLS auto (Let's Encrypt)

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alexandria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alexandria}
      POSTGRES_DB: ${POSTGRES_DB:-alexandria}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alexandria}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-alexandria}:${POSTGRES_PASSWORD:-alexandria}@postgres:5432/${POSTGRES_DB:-alexandria}
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-alexandria=info,tower_http=info}
    ports:
      - "127.0.0.1:8080:8080"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - orchestrator
    environment:
      NEXT_PUBLIC_API_URL: http://orchestrator:8080
      NEXT_PUBLIC_CLUSTER_ID: ${CLUSTER_ID:-}
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - orchestrator
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
