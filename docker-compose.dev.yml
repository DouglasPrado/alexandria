# Alexandria — Development Environment
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   pnpm --filter @alexandria/api db:migrate:dev
#   pnpm --filter @alexandria/api db:seed

services:
  postgres:
    image: postgres:18
    container_name: alexandria-postgres
    environment:
      POSTGRES_USER: alexandria
      POSTGRES_PASSWORD: alexandria
      POSTGRES_DB: alexandria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alexandria-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
