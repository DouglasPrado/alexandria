# Alexandria — Development Environment
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   pnpm --filter @alexandria/api db:migrate:dev
#   pnpm --filter @alexandria/api db:seed

services:
  postgres:
    image: postgres:18
    container_name: alexandria-postgres
    environment:
      POSTGRES_USER: alexandria
      POSTGRES_PASSWORD: alexandria
      POSTGRES_DB: alexandria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alexandria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alexandria-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Grafana Loki: agregação de logs (pino JSON → Loki) ---
  loki:
    image: grafana/loki:3.4
    container_name: alexandria-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  # --- Grafana: visualização de logs ---
  grafana:
    image: grafana/grafana:11.6
    container_name: alexandria-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki

volumes:
  pgdata:
  loki_data:
  grafana_data:
